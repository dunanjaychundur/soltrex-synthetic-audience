<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segment Builder — Soltrex</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f1;
    --ink: #1a1916;
    --ink-muted: #6b6a66;
    --ink-faint: #b0afa9;
    --surface: #ffffff;
    --border: #e2e1dc;
    --radius: 10px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 2rem; height: 56px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  .wordmark { font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.15em; font-weight: 500; text-transform: uppercase; }
  .wordmark span { color: var(--ink-faint); font-size: 11px; margin-left: 8px; }
  .nav-links { display: flex; gap: 20px; }
  .nav-links a { font-size: 13px; color: var(--ink-muted); text-decoration: none; }
  .nav-links a:hover { color: var(--ink); }

  main { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem; }

  .hero { margin-bottom: 2.5rem; }
  .hero h1 { font-size: 2rem; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
  .hero p { font-size: 15px; color: var(--ink-muted); line-height: 1.6; max-width: 520px; }

  .layout { display: grid; grid-template-columns: 380px 1fr; gap: 24px; align-items: start; }

  .builder-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.75rem;
  }

  .card-title {
    font-size: 11px; font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-muted); margin-bottom: 1.5rem;
  }

  .field { margin-bottom: 1.25rem; }
  .field label { display: block; font-size: 13px; color: var(--ink-muted); margin-bottom: 6px; }

  .field input, .field select {
    width: 100%; height: 40px; border: 1px solid var(--border);
    border-radius: var(--radius); padding: 0 12px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    color: var(--ink); background: var(--bg); outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--ink); }
  .field input::placeholder { color: var(--ink-faint); }

  .range-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .build-btn {
    width: 100%; height: 44px; background: var(--ink); color: white;
    border: none; border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; margin-top: 0.5rem; transition: opacity 0.15s;
  }
  .build-btn:hover { opacity: 0.85; }
  .build-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .segment-name-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .segment-name-row input { flex: 1; }

  .results-panel {}

  .empty-state {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 3rem 2rem;
    text-align: center; color: var(--ink-muted); font-size: 14px;
  }

  .segment-header {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.5rem;
    margin-bottom: 16px; display: flex; align-items: center;
    justify-content: space-between;
  }

  .segment-header h2 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .segment-header p { font-size: 13px; color: var(--ink-muted); }

  .segment-stats { display: flex; gap: 24px; }
  .stat { text-align: right; }
  .stat .val { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; }
  .stat .lbl { font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.06em; }

  .save-btn {
    height: 36px; padding: 0 16px; background: transparent;
    border: 1px solid var(--border); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--ink-muted); cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .save-btn:hover { border-color: var(--ink); color: var(--ink); }

  .breakdown-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-bottom: 16px;
  }

  .breakdown-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem;
  }
  .breakdown-title { font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; font-family: 'DM Mono', monospace; }

  .breakdown-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .breakdown-label { font-size: 12px; color: var(--ink-muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .breakdown-bar-track { width: 60px; height: 4px; background: var(--bg); border-radius: 2px; flex-shrink: 0; }
  .breakdown-bar-fill { height: 100%; border-radius: 2px; background: var(--ink); }
  .breakdown-pct { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--ink-muted); width: 28px; text-align: right; flex-shrink: 0; }

  .personas-table {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden;
  }

  .table-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.08em;
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 2fr;
    gap: 12px;
  }

  .persona-row {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 2fr;
    gap: 12px; font-size: 13px; transition: background 0.1s;
  }
  .persona-row:last-child { border-bottom: none; }
  .persona-row:hover { background: var(--bg); }

  .persona-cell { display: flex; align-items: center; }
  .persona-cell.muted { color: var(--ink-muted); }
  .persona-cell.truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

  .tag {
    display: inline-block; font-size: 11px; padding: 2px 8px;
    border-radius: 12px; background: var(--bg); border: 1px solid var(--border);
    color: var(--ink-muted); white-space: nowrap;
  }

  .status-bar {
    display: none; align-items: center; gap: 10px;
    padding: 10px 14px; background: var(--bg);
    border-radius: var(--radius); margin-top: 1rem;
    font-size: 13px; color: var(--ink-muted);
  }
  .status-bar.visible { display: flex; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-bar { display: none; padding: 10px 14px; background: #fff5f5; border: 1px solid #fecaca; border-radius: var(--radius); margin-top: 1rem; font-size: 13px; color: #dc2626; }
  .error-bar.visible { display: block; }

  .saved-segments { margin-top: 1.5rem; }
  .saved-title { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 10px; }
  .saved-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--ink-muted); cursor: pointer; margin: 0 4px 6px 0; transition: all 0.15s; }
  .saved-chip:hover { border-color: var(--ink); color: var(--ink); }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .breakdown-grid { grid-template-columns: 1fr 1fr; }
    .table-header, .persona-row { grid-template-columns: 2fr 1fr 1fr; }
    .persona-row > *:nth-child(4), .persona-row > *:nth-child(5),
    .table-header > *:nth-child(4), .table-header > *:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="wordmark">SOLTREX <span>AI</span></div>
  <div class="nav-links">
    <a href="/">Analyzer</a>
    <a href="/segments">Segments</a>
  </div>
</header>

<main>
  <div class="hero">
    <h1>Segment Builder</h1>
    <p>Define your audience criteria and we'll pull matching individuals from 50,000 real Nemotron personas.</p>
  </div>

  <div class="layout">
    <div class="builder-card">
      <div class="card-title">Define segment</div>

      <div class="field">
        <label>Segment name</label>
        <input type="text" id="segmentName" placeholder="e.g. Young urban gamers" />
      </div>

      <div class="field">
        <label>Age range</label>
        <div class="range-row">
          <input type="number" id="ageMin" placeholder="Min age" min="18" max="99" value="18" />
          <input type="number" id="ageMax" placeholder="Max age" min="18" max="99" value="35" />
        </div>
      </div>

      <div class="field">
        <label>Sex</label>
        <select id="sex">
          <option value="">Any</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>

      <div class="field">
        <label>State</label>
        <select id="state">
          <option value="">Any state</option>
          <option>Alabama</option><option>Alaska</option><option>Arizona</option>
          <option>Arkansas</option><option>California</option><option>Colorado</option>
          <option>Connecticut</option><option>Delaware</option><option>Florida</option>
          <option>Georgia</option><option>Hawaii</option><option>Idaho</option>
          <option>Illinois</option><option>Indiana</option><option>Iowa</option>
          <option>Kansas</option><option>Kentucky</option><option>Louisiana</option>
          <option>Maine</option><option>Maryland</option><option>Massachusetts</option>
          <option>Michigan</option><option>Minnesota</option><option>Mississippi</option>
          <option>Missouri</option><option>Montana</option><option>Nebraska</option>
          <option>Nevada</option><option>New Hampshire</option><option>New Jersey</option>
          <option>New Mexico</option><option>New York</option><option>North Carolina</option>
          <option>North Dakota</option><option>Ohio</option><option>Oklahoma</option>
          <option>Oregon</option><option>Pennsylvania</option><option>Rhode Island</option>
          <option>South Carolina</option><option>South Dakota</option><option>Tennessee</option>
          <option>Texas</option><option>Utah</option><option>Vermont</option>
          <option>Virginia</option><option>Washington</option><option>West Virginia</option>
          <option>Wisconsin</option><option>Wyoming</option>
        </select>
      </div>

      <div class="field">
        <label>Education</label>
        <select id="education">
          <option value="">Any</option>
          <option>High school diploma</option>
          <option>Some college</option>
          <option>Bachelor's degree</option>
          <option>Master's degree</option>
          <option>Doctoral degree</option>
        </select>
      </div>

      <div class="field">
        <label>Income level</label>
        <select id="income">
          <option value="">Any</option>
          <option>Low</option>
          <option>Lower-middle</option>
          <option>Middle</option>
          <option>Upper-middle</option>
          <option>High</option>
        </select>
      </div>

      <div class="field">
        <label>Occupation keywords</label>
        <input type="text" id="occupation" placeholder="e.g. engineer, teacher, nurse" />
      </div>

      <div class="field">
        <label>Interest keywords</label>
        <input type="text" id="interests" placeholder="e.g. gaming, fitness, cooking" />
      </div>

      <div class="field">
        <label>Political affiliation</label>
        <select id="political">
          <option value="">Any</option>
          <option>Democrat</option>
          <option>Republican</option>
          <option>Independent</option>
          <option>Liberal</option>
          <option>Conservative</option>
          <option>Moderate</option>
        </select>
      </div>

      <div class="field">
        <label>Max personas to pull</label>
        <select id="limit">
          <option value="20">20 — quick preview</option>
          <option value="50" selected>50 — standard</option>
          <option value="100">100 — deep panel</option>
        </select>
      </div>

      <button class="build-btn" id="buildBtn" onclick="buildSegment()">Build segment</button>

      <div class="status-bar" id="statusBar">
        <div class="spinner"></div>
        <span id="statusText">Querying Nemotron personas...</span>
      </div>
      <div class="error-bar" id="errorBar"></div>

      <div class="saved-segments" id="savedSegments" style="display:none">
        <div class="saved-title">Saved segments</div>
        <div id="savedChips"></div>
      </div>
    </div>

    <div class="results-panel" id="results">
      <div class="empty-state">
        Define your criteria and click Build segment to query the Nemotron panel.
      </div>
    </div>
  </div>
</main>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8000' : '';

let savedSegments = JSON.parse(localStorage.getItem('soltrex_segments') || '[]');

function renderSavedChips() {
  if (!savedSegments.length) { document.getElementById('savedSegments').style.display = 'none'; return; }
  document.getElementById('savedSegments').style.display = 'block';
  document.getElementById('savedChips').innerHTML = savedSegments.map((s, i) =>
    `<span class="saved-chip" onclick="loadSegment(${i})">↗ ${s.name} <span style="color:var(--ink-faint)">(${s.count})</span></span>`
  ).join('');
}

function loadSegment(i) {
  const s = savedSegments[i];
  document.getElementById('segmentName').value = s.name;
  document.getElementById('ageMin').value = s.criteria.age_min || 18;
  document.getElementById('ageMax').value = s.criteria.age_max || 99;
  document.getElementById('sex').value = s.criteria.sex || '';
  document.getElementById('state').value = s.criteria.state || '';
  document.getElementById('education').value = s.criteria.education || '';
  document.getElementById('income').value = s.criteria.income_level || '';
  document.getElementById('occupation').value = s.criteria.occupation_keywords || '';
  document.getElementById('interests').value = s.criteria.interest_keywords || '';
  document.getElementById('political').value = s.criteria.political_affiliation || '';
  buildSegment();
}

function saveSegment(name, criteria, count) {
  const existing = savedSegments.findIndex(s => s.name === name);
  const entry = { name, criteria, count };
  if (existing >= 0) savedSegments[existing] = entry;
  else savedSegments.push(entry);
  localStorage.setItem('soltrex_segments', JSON.stringify(savedSegments));
  renderSavedChips();
}

function getCriteria() {
  return {
    age_min:              parseInt(document.getElementById('ageMin').value) || 18,
    age_max:              parseInt(document.getElementById('ageMax').value) || 99,
    sex:                  document.getElementById('sex').value || null,
    state:                document.getElementById('state').value || null,
    education:            document.getElementById('education').value || null,
    income_level:         document.getElementById('income').value || null,
    occupation_keywords:  document.getElementById('occupation').value || null,
    interest_keywords:    document.getElementById('interests').value || null,
    political_affiliation:document.getElementById('political').value || null,
    limit:                parseInt(document.getElementById('limit').value) || 50,
  };
}

function pct(n, total) { return total ? Math.round(n / total * 100) : 0; }

function topN(arr, n=5) {
  const counts = {};
  arr.forEach(v => { if (v) counts[v] = (counts[v]||0)+1; });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,n);
}

function renderBreakdown(title, items, total) {
  if (!items.length) return '';
  const max = items[0][1];
  return `
    <div class="breakdown-card">
      <div class="breakdown-title">${title}</div>
      ${items.map(([label, count]) => `
        <div class="breakdown-item">
          <span class="breakdown-label">${label || 'Unknown'}</span>
          <div class="breakdown-bar-track">
            <div class="breakdown-bar-fill" style="width:${Math.round(count/max*100)}%"></div>
          </div>
          <span class="breakdown-pct">${pct(count,total)}%</span>
        </div>
      `).join('')}
    </div>`;
}

function renderResults(data, name, criteria) {
  const personas = data.personas;
  const total    = data.total_matched;
  const shown    = personas.length;

  const ages    = personas.map(p => p.age).filter(Boolean);
  const avgAge  = ages.length ? Math.round(ages.reduce((a,b)=>a+b,0)/ages.length) : '—';

  const sexBreakdown    = topN(personas.map(p => p.sex));
  const stateBreakdown  = topN(personas.map(p => p.state));
  const eduBreakdown    = topN(personas.map(p => p.education));
  const incBreakdown    = topN(personas.map(p => p.income_level));
  const polBreakdown    = topN(personas.map(p => p.political_affiliation));

  const rows = personas.slice(0, 20).map(p => `
    <div class="persona-row">
      <div class="persona-cell truncate">${p.occupation || '—'}</div>
      <div class="persona-cell muted">${p.age || '—'}, ${p.sex || '—'}</div>
      <div class="persona-cell muted">${p.state || '—'}</div>
      <div class="persona-cell"><span class="tag">${(p.income_level || '—').split(' ')[0]}</span></div>
      <div class="persona-cell truncate muted">${(p.hobbies_and_interests || '—').slice(0,80)}</div>
    </div>
  `).join('');

  document.getElementById('results').innerHTML = `
    <div class="segment-header">
      <div>
        <h2>${name || 'Unnamed segment'}</h2>
        <p>Showing ${shown} of ${total.toLocaleString()} matching personas · avg age ${avgAge}</p>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="segment-stats">
          <div class="stat">
            <div class="val">${total.toLocaleString()}</div>
            <div class="lbl">Matched</div>
          </div>
          <div class="stat">
            <div class="val">${avgAge}</div>
            <div class="lbl">Avg age</div>
          </div>
        </div>
        <button class="save-btn" onclick="saveSegment('${(name||'Segment').replace(/'/g,"\\'")}', ${JSON.stringify(criteria).replace(/"/g,'&quot;')}, ${total})">Save segment</button>
      </div>
    </div>

    <div class="breakdown-grid">
      ${renderBreakdown('Sex', sexBreakdown, shown)}
      ${renderBreakdown('State', stateBreakdown, shown)}
      ${renderBreakdown('Education', eduBreakdown, shown)}
      ${renderBreakdown('Income', incBreakdown, shown)}
      ${renderBreakdown('Politics', polBreakdown, shown)}
    </div>

    <div class="personas-table">
      <div class="table-header">
        <span>Occupation</span>
        <span>Age / Sex</span>
        <span>State</span>
        <span>Income</span>
        <span>Interests</span>
      </div>
      ${rows}
    </div>
  `;
}

async function buildSegment() {
  const criteria = getCriteria();
  const name     = document.getElementById('segmentName').value || 'Unnamed segment';

  document.getElementById('errorBar').classList.remove('visible');
  document.getElementById('statusBar').classList.add('visible');
  document.getElementById('statusText').textContent = 'Querying Nemotron personas...';
  document.getElementById('buildBtn').disabled = true;

  try {
    const res = await fetch(`${API}/segments/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(criteria)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Query failed');
    }

    const data = await res.json();
    document.getElementById('statusBar').classList.remove('visible');
    renderResults(data, name, criteria);

  } catch(e) {
    document.getElementById('statusBar').classList.remove('visible');
    document.getElementById('errorBar').textContent = 'Error: ' + e.message;
    document.getElementById('errorBar').classList.add('visible');
  }

  document.getElementById('buildBtn').disabled = false;
}

renderSavedChips();
</script>
</body>
</html>
